# Smoke test: the app cold-starts and renders its first screen.
#
# A cleared launch is unauthenticated, so the app lands on the sign-in screen.
# The "Welcome" onboarding carousel lives behind the auth guard in
# src/app/(app)/_layout.tsx, so it only shows after sign-in, never on a fresh
# install.
#
# Plain @expo/ui SwiftUI <Text> (the "Sign in" heading, button labels) is NOT
# surfaced to Maestro's accessibility query. Maestro maps an iOS
# accessibilityLabel to `text`, so assert the email field's explicit
# accessibilityLabel ("Email address") instead. It renders on the default
# (email) sign-in tab and proves the @expo/ui accessibility path reaches Maestro.
#
# Maestro auto-derives the appId from the build's bundle id, so the same
# flow runs against the dev simulator binary (`com.example.<pkg>` fallback
# in app.config.ts) and the production binary (`com.<your-team>.<app>`)
# without edits.
#
# Run locally: `maestro test .maestro/launch.yaml`
# Run on EAS:  triggered by `.eas/workflows/e2e-tests.yml` on every PR.
appId: ${MAESTRO_APP_ID}
---
- launchApp:
    clearState: true
# Cold start on the EAS simulator can exceed assertVisible's default 7s auto-wait,
# so wait up to 30s for the first frame. extendedWaitUntil takes a timeout and
# also asserts visibility; assertVisible does not (a timeout key on it errors with
# "Unknown Property: timeout").
- extendedWaitUntil:
    visible:
      text: "Email address"
    timeout: 30000
- takeScreenshot: sign-in
