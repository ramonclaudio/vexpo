name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  cancel_in_progress: true
  group: ${{ workflow.filename }}-${{ github.ref }}

jobs:
  precheck:
    name: Precheck
    type: custom
    runs_on: linux-medium
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test

  build_ios:
    name: Build iOS
    needs: [precheck]
    type: build
    params:
      platform: ios
      profile: production

  submit_ios:
    name: Submit to App Store
    needs: [build_ios]
    type: custom
    runs_on: linux-medium
    # `production` pulls the ASC_APP_ID env var (set by `vexpo asc:connect`) so the
    # committed eas.json stays free of the app's id, which matters when the repo
    # is public. The inject step is a no-op if ASC_APP_ID isn't set.
    environment: production
    steps:
      - uses: eas/checkout
      - uses: eas/install_node_modules
      - name: Inject ascAppId into eas.json
        run: node scripts/eas-inject-asc-app-id.mjs
      - name: Submit to App Store
        run: npx eas-cli submit -p ios --profile production --id ${{ needs.build_ios.outputs.build_id }} --non-interactive
