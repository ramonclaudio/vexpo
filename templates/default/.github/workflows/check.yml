name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx expo-doctor
      # Generate expo-router typed routes (.expo/types, gitignored) so typecheck
      # catches typedRoutes route-string regressions. Runs without a dev server.
      - run: npx expo customize tsconfig.json
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
