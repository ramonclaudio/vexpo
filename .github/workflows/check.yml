name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  packages:
    name: packages (typecheck, lint, format, build, test, e2e)
    runs-on: ubuntu-latest
    # `engines` claims >=20.10, so test the floor, the dev version, and current.
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20.10", "22", "24"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # Node 20.10 bundles npm 10.2.3, whose optional-deps resolution skips
      # platform binaries (oxlint's native binding) on `npm ci`. The leg tests
      # the node engines floor, not stock npm, so lift npm to the last 10.x.
      - run: npm install -g npm@10
        if: matrix.node-version == '20.10'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test:packages
      # Coverage gate for the CLI, one Node to avoid triple work. Fails if
      # coverage drops below the thresholds pinned in `vitest.config.ts`.
      - run: npm run coverage
        if: matrix.node-version == '22'
      - run: npm run test:packages:e2e
      # Guard the publish surface: fail if a tarball would ship anything outside
      # each package's `files` allowlist (source, tests, env files, keys).
      - run: node .github/scripts/pack-guard.mjs packages/vexpo
      - run: node .github/scripts/pack-guard.mjs packages/create-vexpo

  template:
    name: template (typecheck, lint, format, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/default
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: templates/default/package-lock.json
      # Integration-test the CLI source in this PR, not the last npm release.
      # Build and pack the local `@ramonclaudio/vexpo`, then install the tarball
      # over the lockfile pin (`--no-save` keeps the committed lockfile clean).
      - run: npm ci
        working-directory: .
      - run: npm run build -w @ramonclaudio/vexpo
        working-directory: .
      - run: npm pack -w @ramonclaudio/vexpo --pack-destination templates/default
        working-directory: .
      - run: npm ci
      - run: npm install --no-save ramonclaudio-vexpo-*.tgz
      # Drive the packed binary: help must exit 0, and `doctor --json` in the
      # scaffolded template must emit a parseable report (same shape the package
      # e2e asserts). A not-fully-provisioned project is fine, this exercises the
      # real CLI, not just that the tarball installed.
      - run: npx vexpo --help
      - run: npx vexpo doctor --json | node -e 'const r=JSON.parse(require("fs").readFileSync(0));process.exit(Array.isArray(r.checks)&&"summary"in r&&"channel"in r?0:1)'
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test

  knip:
    name: knip (unused exports, deps, files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run knip

  dependency-review:
    name: dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  secrets:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
