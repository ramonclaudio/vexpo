name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  packages:
    name: packages (typecheck, lint, format, build, test, e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun --filter '*' typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun --filter '*' build
      - run: bun --filter '*' test
      - run: bun --filter '@ramonclaudio/vexpo' test:e2e

  template:
    name: template (typecheck, lint, format, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/default
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # `@ramonclaudio/vexpo` is now on npm, so the template installs directly
      # without needing the monorepo's `link:dev` plumbing. This also exercises
      # the customer journey: a fresh `bun install` resolves vexpo from npm.
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run format:check
      - run: bun run test
