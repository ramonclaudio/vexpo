name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  packages:
    name: packages (typecheck, lint, format, build, test, e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test:packages
      - run: npm run test:packages:e2e

  template:
    name: template (typecheck, lint, format, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: templates/default/package-lock.json
      # `@ramonclaudio/vexpo` is on npm, so the template installs directly
      # without needing the monorepo's `link:dev` plumbing. This also exercises
      # the customer journey: a fresh `npm ci` resolves vexpo from npm.
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test
