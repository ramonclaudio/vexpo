name: Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  packages:
    name: packages (typecheck, lint, format, build, test, e2e)
    runs-on: ubuntu-latest
    # `engines` claims >=20.10, so test the floor, the dev version, and current.
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm run test:packages
      # Coverage gate for the CLI, one Node to avoid triple work. Fails if
      # coverage drops below the thresholds pinned in `vitest.config.ts`.
      - run: npm run coverage
        if: matrix.node-version == '22'
      - run: npm run test:packages:e2e
      # Guard the publish surface: fail if a tarball would ship anything outside
      # each package's `files` allowlist (source, tests, env files, keys).
      - run: node .github/scripts/pack-guard.mjs packages/vexpo
      - run: node .github/scripts/pack-guard.mjs packages/create-vexpo

  template:
    name: template (typecheck, lint, format, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: templates/default
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: templates/default/package-lock.json
      # `@ramonclaudio/vexpo` is on npm, so the template installs directly
      # without needing the monorepo's `link:dev` plumbing. This also exercises
      # the customer journey: a fresh `npm ci` resolves vexpo from npm.
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm run test

  knip:
    name: knip (unused exports, deps, files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run knip

  secrets:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
