name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish (e.g. v0.1.0). Must already exist on the repo.
        required: true

# Least privilege at the top; the publish job widens to exactly what it needs.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Forks lack NPM_TOKEN and don't own the packages, so a synced v* tag would
    # run the whole pipeline into a doomed npm publish (upstream expo/expo#45859).
    if: github.repository == 'ramonclaudio/vexpo'
    # Least privilege: `contents: write` for the GitHub release, `id-token: write`
    # so npm can attach build provenance to the published packages.
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Verify tag matches package versions
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          echo "Tag: $TAG / Version: $VERSION"
          for pkg in packages/vexpo packages/create-vexpo; do
            pkg_version=$(node -p "require('./$pkg/package.json').version")
            if [ "$pkg_version" != "$VERSION" ]; then
              echo "::error::Version mismatch in $pkg: package.json says $pkg_version, tag is $VERSION"
              exit 1
            fi
          done

      - run: npm run typecheck
      - run: npm run build
      - run: npm run test:packages
      # Smoke-test the built binaries before they reach the registry.
      - run: npm run test:packages:e2e

      # Rehearse the publish: pack each package and fail if it would ship
      # anything outside its `files` allowlist, then dry-run the registry upload.
      - name: Publish dry-run rehearsal
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node .github/scripts/pack-guard.mjs packages/vexpo
          node .github/scripts/pack-guard.mjs packages/create-vexpo
          npm publish --dry-run -w @ramonclaudio/vexpo
          npm publish --dry-run -w @ramonclaudio/create-vexpo

      # `--access public` and `--provenance` come from each package's
      # `publishConfig`, so the CLI needs no flags. Auth is the NPM_TOKEN secret;
      # `id-token: write` above lets npm attach provenance.
      # Guard each publish so a re-run finishes a half-published release instead
      # of dying on npm's "cannot publish over previously published version".
      - name: Publish vexpo
        working-directory: packages/vexpo
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@ramonclaudio/vexpo@$VERSION" version >/dev/null 2>&1; then
            echo "@ramonclaudio/vexpo@$VERSION already published, skipping."
          else
            npm publish
          fi

      - name: Publish create-vexpo
        working-directory: packages/create-vexpo
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@ramonclaudio/create-vexpo@$VERSION" version >/dev/null 2>&1; then
            echo "@ramonclaudio/create-vexpo@$VERSION already published, skipping."
          else
            npm publish
          fi

      - name: Extract changelog entry
        id: changelog
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry for $VERSION; using fallback." > release-notes.md
          fi
          {
            echo "notes<<EOF"
            cat release-notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
