name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish (e.g. v0.1.0). Must already exist on the repo.
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Verify tag matches package versions
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Tag: $TAG / Version: $VERSION"
          for pkg in packages/vexpo packages/create-vexpo; do
            pkg_version=$(node -p "require('./$pkg/package.json').version")
            if [ "$pkg_version" != "$VERSION" ]; then
              echo "::error::Version mismatch in $pkg: package.json says $pkg_version, tag is $VERSION"
              exit 1
            fi
          done

      - run: bun --filter '*' typecheck
      - run: bun --filter '*' build
      - run: bun --filter '*' test

      # `--access public` and `--provenance` are configured in each
      # package's `publishConfig` block, so the CLI doesn't need the flags.
      - name: Publish vexpo
        working-directory: packages/vexpo
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Publish create-vexpo
        working-directory: packages/create-vexpo
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Extract changelog entry
        id: changelog
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No changelog entry for $VERSION; using fallback." > release-notes.md
          fi
          {
            echo "notes<<EOF"
            cat release-notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(inputs.tag || github.ref_name, '-') }}
